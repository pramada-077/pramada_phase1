<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>
<body>

    <h1>Login Form</h1>

    <form>

        <label>Username:</label><br>
        <input type="text" required><br><br>

        <label>Password:</label><br>
        <input type="password" required><br><br>

        <button type="submit">Login</button>
        <button type="reset">Cancel</button>

    </form>

</body>
</html>
