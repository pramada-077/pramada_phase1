<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>
<body>

    <h1>Feedback Form</h1>

    <form>

        <label>Your Feedback:</label><br>
        <textarea rows="5" cols="30" required></textarea><br><br>

        <label>Rating:</label><br>
        <input type="radio" name="rating"> 1
        <input type="radio" name="rating"> 2
        <input type="radio" name="rating"> 3
        <input type="radio" name="rating"> 4
        <input type="radio" name="rating"> 5<br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
